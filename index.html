<!-- 婉宁老师教学小助手 · GitHub轻量版 -->
﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f3ecee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>婉宁老师教学小助手 🎀</title>
<link rel="preload" href="liaobiaoxinyi.mp3" as="audio">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="cute"]{
  --bg:#f8f6f4;--surface:#fdfcfb;--border:#e6e0dc;
  --text:#45403c;--text2:#8a8480;--accent:#b8959a;
  --accent-bg:#f3ecee;--hover:#f5f2f0;--shadow:0 1px 4px rgba(70,55,55,.06);
  --radius:14px;--sidebar:252px;--success:#7aab8e;--warn:#c4a574;--danger:#c47a7a;
  --hero-grad:linear-gradient(145deg,#f3ecee 0%,#f8f6f4 60%,#faf8f6 100%);
  --bow:#ddd4d6;--bnav-h:56px;
}
[data-theme="dark"]{
  --bg:#1c1a1e;--surface:#262428;--border:#3a383c;
  --text:#e8e4e6;--text2:#a8a4a6;--accent:#c9a0a8;
  --accent-bg:#322e32;--hover:#2e2c30;--shadow:0 1px 4px rgba(0,0,0,.25);
  --hero-grad:linear-gradient(145deg,#262428,#1c1a1e);
  --bow:#4a4448;
}
[data-theme="eye"]{
  --bg:#f3efe6;--surface:#faf7f0;--border:#ddd6c8;
  --text:#3d3830;--text2:#7a7468;--accent:#a08070;
  --accent-bg:#ebe4d6;--hover:#e8e2d6;--shadow:0 1px 4px rgba(80,70,50,.08);
  --hero-grad:linear-gradient(145deg,#ebe4d6,#f3efe6);
  --bow:#ccc4b4;
}
html{font-size:calc(15px * var(--font-scale,1));touch-action:manipulation;-webkit-text-size-adjust:100%}
body{font-family:"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;transition:background .3s,color .3s;overflow-x:hidden;max-width:100vw;overscroll-behavior-x:none}
body:not(.app-ready) .app{visibility:hidden}
body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.12;z-index:0;background-image:radial-gradient(circle at 20% 30%,var(--bow) 1px,transparent 1px),radial-gradient(circle at 80% 70%,var(--bow) 1px,transparent 1px);background-size:56px 56px}
.app{position:relative;z-index:1}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:.875rem}

.app{display:flex;height:100vh;overflow:hidden;max-width:100vw;width:100%}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--border);position:relative;background:var(--accent-bg)}
.sidebar-header::before{content:"🎀";position:absolute;right:14px;top:12px;font-size:1.3rem;opacity:.7}
.sidebar-header h1{font-size:1.02rem;font-weight:600;display:flex;align-items:center;gap:6px}
.sidebar-header h1::before{content:"🐱";font-size:1.1rem}
.sidebar-header p{font-size:.72rem;color:var(--text2);margin-top:3px}
.nav-list{flex:1;overflow-y:auto;padding:6px 8px 16px}
.nav-item{display:flex;align-items:center;gap:6px;width:100%;text-align:left;padding:8px 12px;border-radius:6px;font-size:.84rem;color:var(--text);transition:background .12s}
.nav-item:hover{background:var(--hover)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.nav-group{font-size:.68rem;color:var(--text2);padding:14px 12px 5px;font-weight:600;letter-spacing:.04em}
.nav-badge{margin-left:auto;font-size:.65rem;background:var(--accent-bg);color:var(--accent);padding:1px 6px;border-radius:10px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.search-wrap{flex:1;max-width:420px;position:relative}
.search-wrap input{width:100%;padding:7px 12px 7px 34px;border:1px solid var(--border);border-radius:6px;background:var(--bg);outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2)}
.topbar-actions{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.btn{padding:6px 12px;border-radius:6px;font-size:.8rem;color:var(--text2);transition:all .12s;border:1px solid transparent}
.btn:hover{background:var(--hover);color:var(--text)}
.btn.on{background:var(--accent-bg);color:var(--accent);border-color:#bfdbfe}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{filter:brightness(1.08);color:#fff}
.btn-danger{color:var(--danger)}
.btn-danger:hover{background:#fef2f2}

.content{flex:1;overflow-y:auto;padding:22px 28px 40px}
.content-inner{max-width:860px}

.section-title{font-size:1.3rem;font-weight:600;margin-bottom:4px}
.section-desc{font-size:.84rem;color:var(--text2);margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:11px 16px;background:var(--bg);border-bottom:1px solid var(--border);font-weight:600;font-size:.88rem;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-body{padding:16px}

.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 3px;font-size:.9em}
.frac .num{border-bottom:1.5px solid currentColor;padding:0 4px 1px;line-height:1.2}
.frac .den{padding:1px 4px 0;line-height:1.2}
sup{font-size:.7em;vertical-align:super}sub{font-size:.7em;vertical-align:sub}

.formula-item,.point-item{padding:10px 0;border-bottom:1px solid var(--border)}
.formula-item:last-child,.point-item:last-child{border-bottom:none}
.formula-name{font-size:.78rem;color:var(--accent);font-weight:500;margin-bottom:4px}
.formula-expr{font-size:1rem;padding:8px 12px;background:var(--bg);border-radius:6px;font-family:"Cambria Math","Times New Roman",serif;overflow-x:auto}
.formula-note,.point-text{font-size:.8rem;color:var(--text2);margin-top:4px}
.point-title{font-weight:600;font-size:.85rem;margin-bottom:2px}

.home-hero{padding:22px 24px;background:var(--hero-grad);border:2px solid var(--border);border-radius:var(--radius);margin-bottom:18px;position:relative;overflow:hidden}
.home-hero::after{content:"";display:none}
.home-deco-mascot{position:absolute;pointer-events:none;z-index:0;opacity:.92}
.home-deco-kitty{right:8px;top:12px;width:64px;animation:kitty-bounce 2.2s ease-in-out infinite}
.home-deco-lulu{left:6px;bottom:8px;width:58px;animation:lulu-wobble 2.8s ease-in-out infinite .4s}
@keyframes kitty-bounce{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-8px) rotate(4deg)}}
@keyframes lulu-wobble{0%,100%{transform:rotate(-6deg) scale(1)}50%{transform:rotate(6deg) scale(1.06)}}
.home-hero .hero-top,.home-hero .greet-heart,.home-hero>p{position:relative;z-index:1}
.home-hero h2{font-size:1.25rem;margin-bottom:6px;color:var(--accent)}
.home-hero .hero-top h2{margin-bottom:4px}
.home-hero .greet-sub{font-size:.88rem;color:var(--text2);line-height:1.7}
.home-hero .greet-heart{font-size:.8rem;color:var(--accent);margin-top:8px;opacity:.85}
.home-quick{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:16px 0}
.quick-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center;cursor:pointer;transition:all .15s}
.quick-btn:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(37,99,235,.1)}
.quick-btn .icon{font-size:1.4rem;margin-bottom:4px}
.quick-btn .label{font-size:.82rem;font-weight:500}
.quick-btn .sub{font-size:.7rem;color:var(--text2);margin-top:2px}
.home-stats{display:flex;gap:20px;flex-wrap:wrap;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.stat-num{font-size:1.4rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:.72rem;color:var(--text2)}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.home-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .12s}
.home-card:hover{border-color:var(--accent)}
.home-card h3{font-size:.88rem;margin-bottom:3px}
.home-card p{font-size:.73rem;color:var(--text2)}

/* Quiz */
.quiz-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:16px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.75rem;color:var(--text2);font-weight:500}
.field select,.field input{padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);min-width:100px}
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 10px;border:1px solid var(--border);border-radius:20px;font-size:.78rem;cursor:pointer;transition:all .12s}
.chip.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.quiz-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.quiz-q{padding:14px 16px;display:flex;gap:12px}
.quiz-num{flex-shrink:0;width:28px;height:28px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600}
.tag-type-q{font-size:.65rem;padding:2px 7px;border-radius:4px;background:var(--accent-bg);color:var(--accent);margin-right:4px}
.quiz-text{flex:1;font-size:.9rem;white-space:pre-wrap;line-height:1.7}
.quiz-meta{font-size:.72rem;color:var(--text2);margin-top:4px}
.quiz-ans{border-top:1px dashed var(--border);padding:12px 16px 14px 56px;background:#fafffe;font-size:.85rem;display:none}
.quiz-ans.show{display:block}
.quiz-ans-label{font-size:.72rem;color:var(--success);font-weight:600;margin-bottom:6px}
.quiz-steps{color:var(--text2);font-size:.82rem;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);white-space:pre-wrap}
.quiz-actions{padding:8px 16px 12px 56px;display:flex;gap:8px;flex-wrap:wrap}
.quiz-actions button{font-size:.76rem;padding:4px 10px;border-radius:4px;border:1px solid var(--border);color:var(--text2)}
.quiz-actions button:hover{background:var(--hover)}

/* Notebook */
.note-toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.note-toolbar input,.note-toolbar select{padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface)}
.note-list{display:flex;flex-direction:column;gap:10px}
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative}
.note-card:hover{border-color:#cbd5e1}
.note-head{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.tag{font-size:.68rem;padding:2px 8px;border-radius:4px;font-weight:500}
.tag-topic{background:var(--accent-bg);color:var(--accent)}
.tag-source{background:#f0fdf4;color:var(--success)}
.tag-type{background:#fef3c7;color:var(--warn)}
.tag-mastered{background:#f0fdf4;color:var(--success)}
.note-date{font-size:.75rem;color:var(--text2)}
.note-title{font-weight:600;font-size:.9rem;margin-bottom:6px}
.note-block{font-size:.84rem;margin-bottom:6px}
.note-block b{color:var(--text);font-weight:600;font-size:.78rem;display:block;margin-bottom:2px}
.note-actions{position:absolute;top:12px;right:12px;display:flex;gap:4px}
.note-actions button{font-size:.75rem;padding:3px 8px;border-radius:4px;color:var(--text2)}
.note-actions button:hover{background:var(--hover)}
.note-empty{text-align:center;padding:40px;color:var(--text2)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:10px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);font-weight:600;display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:16px 20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg)}
.form-row textarea{min-height:72px;resize:vertical}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1d23;color:#fff;padding:10px 20px;border-radius:8px;font-size:.84rem;z-index:200;transition:transform .35s ease,opacity .35s ease,visibility .35s;pointer-events:none;max-width:min(92vw,420px);text-align:center;line-height:1.45;opacity:0;visibility:hidden}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible}
@media(max-width:768px){
  .toast{bottom:calc(var(--bnav-h) + env(safe-area-inset-bottom) + 18px);z-index:10001;padding:12px 18px;font-size:.88rem;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.18)}
}

.search-results .result-item{padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer}
.search-results .result-item:hover{background:var(--accent-bg);border-color:var(--accent)}
.result-cat{font-size:.7rem;color:var(--accent)}
.result-title{font-size:.85rem;font-weight:500}
.result-snippet{font-size:.78rem;color:var(--text2)}
.star-btn{color:var(--text2);font-size:1rem}
.star-btn.on{color:#f59e0b}
kbd{display:inline-block;padding:2px 6px;font-size:.72rem;background:var(--bg);border:1px solid var(--border);border-radius:4px}
.date-divider{font-size:.78rem;color:var(--text2);padding:8px 0 4px;border-bottom:1px solid var(--border);margin:8px 0 6px;font-weight:500}

/* Tools: formula / draw / graph */
.tool-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tool-tab{padding:8px 14px;border-radius:20px;border:1px solid var(--border);font-size:.82rem;cursor:pointer;background:var(--surface)}
.tool-tab.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:500}
.latex-input{width:100%;min-height:80px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);font-family:Consolas,monospace;font-size:.9rem;resize:vertical}
.latex-preview{min-height:60px;padding:16px;background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);margin:10px 0;font-size:1.2rem;overflow-x:auto}
.latex-btns{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;margin:10px 0}
.latex-btns button{padding:10px 6px;border:1px solid var(--border);border-radius:10px;font-size:.78rem;background:var(--surface);min-height:44px;-webkit-tap-highlight-color:transparent}
.latex-btns button:active{background:var(--accent-bg);border-color:var(--accent);transform:scale(.97)}
.latex-btns button.ltx-flash{background:var(--accent-bg);border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.formula-export-box{background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);padding:16px;margin:12px 0}
.formula-action-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.formula-action-bar .btn-primary{grid-column:1/-1;padding:14px!important;font-size:.95rem!important}
.math-stamp-bar{display:flex;gap:6px;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:8px}
.math-stamp-bar::-webkit-scrollbar{display:none}
.math-stamp{padding:10px 14px;min-width:44px;min-height:44px;border:1px solid var(--border);border-radius:10px;background:var(--surface);font-size:1.1rem;flex-shrink:0;font-family:"Cambria Math",serif}
.math-stamp.on{background:var(--accent-bg);border-color:var(--accent)}
.draw-canvas-wrap{touch-action:none;user-select:none;-webkit-user-select:none}
.draw-toolbar-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.draw-toolbar-row .btn{min-height:44px;padding:10px 14px}
.export-bar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.export-bar .btn{flex:1;min-width:120px;min-height:44px;padding:12px!important}
.canvas-wrap{position:relative;border:2px solid var(--border);border-radius:var(--radius);background:#fff;overflow:hidden}
.canvas-wrap canvas{display:block;width:100%;cursor:crosshair;touch-action:none}
.canvas-toolbar{display:flex;flex-wrap:wrap;gap:8px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;align-items:center}
.canvas-toolbar label{font-size:.75rem;color:var(--text2)}
.canvas-toolbar input[type=color]{width:32px;height:28px;border:none;cursor:pointer}
.canvas-toolbar input[type=range]{width:80px}
.graph-panel{display:grid;grid-template-columns:1fr 260px;gap:14px}
@media(max-width:800px){.graph-panel{grid-template-columns:1fr}}
.graph-controls{padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.graph-controls .form-row{margin-bottom:10px}
.graph-controls label{font-size:.75rem;color:var(--text2);display:block;margin-bottom:3px}
.graph-controls input[type=range]{width:100%}
.graph-canvas{border:2px solid var(--border);border-radius:var(--radius);background:#fff}
.quiz-year{display:inline-block;font-size:.68rem;background:var(--accent-bg);color:var(--accent);padding:2px 8px;border-radius:10px;margin-left:6px}
.report-pre{font-size:.82rem;line-height:1.75;white-space:pre-wrap;font-family:inherit;color:var(--text);background:var(--bg);padding:12px;border-radius:8px;overflow-x:auto}
.timer-page{text-align:center}
.timer-display{font-size:3.5rem;font-weight:300;letter-spacing:.08em;padding:32px 0;color:var(--accent);font-variant-numeric:tabular-nums;transition:font-size .2s}
body.timer-landscape{overflow:hidden}
body.timer-landscape .bottom-nav,body.timer-landscape .sidebar,body.timer-landscape .topbar{display:none!important}
body.timer-landscape .main{height:100vh}
body.timer-landscape .content{padding:0!important;height:100vh}
body.timer-landscape .timer-landscape-active{position:fixed;inset:0;z-index:500;display:flex!important;flex-direction:column;justify-content:center;align-items:center;background:var(--bg);padding:env(safe-area-inset);max-width:none!important;width:100%}
body.timer-landscape .timer-landscape-active .section-title,body.timer-landscape .timer-landscape-active .section-desc{display:none}
body.timer-landscape .timer-landscape-active .timer-display{font-size:min(32vw,42vh);padding:5vh 0}
body.timer-landscape .timer-landscape-active .timer-big{min-width:140px;padding:18px 36px!important;font-size:1.15rem!important}
.timer-scene-presets{display:flex;gap:8px;justify-content:center;margin:8px 0;flex-wrap:wrap}
.timer-modes,.timer-presets{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0}
.timer-btns{display:flex;gap:12px;justify-content:center;margin-top:16px}
.timer-big{padding:14px 32px!important;font-size:1rem!important;border-radius:12px!important;min-width:120px}
.more-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:calc(var(--bnav-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--surface);border-top:1px solid var(--border);z-index:10000;box-shadow:0 -2px 12px rgba(0,0,0,.04);pointer-events:auto!important;touch-action:manipulation}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 0;color:var(--text2);font-size:.65rem;-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer}
.bnav-item.active{color:var(--accent)}
.bnav-icon{font-size:1.25rem;line-height:1}
.bnav-label{font-size:.68rem}
.backup-card .btn-primary{font-size:1rem}
.auth-gate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(165deg,#fce8ee 0%,#f8f6f4 40%,#fff5f8 100%);overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;pointer-events:auto}
.auth-wrap,.auth-dual-wrap{position:relative;z-index:2;pointer-events:auto}
.auth-btn,.auth-dual-btn,.auth-input,.auth-dual-input,.auth-heart-float-btn,.auth-heart-tap{touch-action:manipulation;-webkit-tap-highlight-color:transparent;pointer-events:auto}
.auth-btn,.auth-dual-btn{min-height:48px;cursor:pointer}
.auth-gate::before{content:"";position:absolute;inset:0;opacity:.35;background-image:radial-gradient(circle,#ffc8d8 1.5px,transparent 1.5px);background-size:28px 28px;pointer-events:none}
.auth-gate.auth-out{opacity:0;transition:opacity .35s;pointer-events:none}
.auth-wrap{position:relative;z-index:1;width:100%;max-width:360px}
.auth-deco{position:absolute;pointer-events:none;opacity:.88}
.auth-deco-dog{left:-8px;top:-36px;width:72px;animation:auth-float 3.2s ease-in-out infinite}
.auth-deco-kitty{right:-12px;top:-40px;width:76px;animation:auth-float 2.8s ease-in-out infinite .6s}
.auth-deco-paw{bottom:-28px;left:12px;width:44px;opacity:.5;animation:auth-float 3.5s ease-in-out infinite 1s}
.auth-deco-bow{top:-18px;right:28%;font-size:1.6rem;animation:auth-wiggle 2s ease-in-out infinite}
@keyframes auth-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes auth-wiggle{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.auth-svg{fill:none;stroke:#c9a0a8;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.auth-card{background:var(--surface);border:2px solid #f0d4dc;border-radius:28px;padding:28px 22px 24px;width:100%;text-align:center;box-shadow:0 10px 36px rgba(201,160,168,.18);position:relative}
.auth-card::before{content:"✦";position:absolute;top:10px;left:14px;font-size:.75rem;color:#f0b8c8;opacity:.8}
.auth-card::after{content:"✦";position:absolute;top:14px;right:16px;font-size:.65rem;color:#f0b8c8;opacity:.6}
.auth-btn{box-shadow:0 4px 14px rgba(184,149,154,.35)}
.auth-input{border-color:#f0d4dc}
.auth-avatar{width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid var(--accent-bg);box-shadow:0 4px 16px rgba(184,149,154,.22);margin:0 auto 12px;display:block}
.auth-card h2{font-size:1.05rem;color:var(--accent);margin-bottom:4px;font-weight:600}
.auth-sub{font-size:.78rem;color:var(--text2);margin-bottom:14px}
.auth-hint{font-size:.86rem;color:var(--text2);margin-bottom:14px}
.auth-input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:14px;text-align:center;font-size:1.05rem;letter-spacing:.12em;background:var(--bg);margin-bottom:12px}
.auth-input:focus{outline:none;border-color:var(--accent)}
.auth-btn{width:100%;padding:14px;border-radius:16px;background:linear-gradient(135deg,#c9a0a8,#b8959a);color:#fff;font-size:.92rem;font-weight:500;margin-bottom:8px}
.auth-msg{font-size:.8rem;color:var(--danger);min-height:1.4em;line-height:1.5}
body.auth-pending .bottom-nav{display:none!important}
/* 一级登录 · 飘落动画 */
.auth-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.auth-float-item{position:absolute;font-size:1rem;opacity:0;pointer-events:none;animation:auth-drift linear forwards}
@keyframes auth-drift{0%{opacity:0;transform:translateY(0) rotate(0deg) scale(.6)}8%{opacity:.75}92%{opacity:.55}100%{opacity:0;transform:translateY(-110vh) rotate(360deg) scale(1)}}
.auth-burst{position:fixed;pointer-events:none;z-index:10001;font-size:1.1rem;animation:auth-burst .85s ease-out forwards}
@keyframes auth-burst{0%{opacity:1;transform:translate(0,0) scale(.4)}100%{opacity:0;transform:translate(var(--bx,0),var(--by,-48px)) scale(1.2)}}
.auth-heart-float-btn{position:absolute;bottom:18%;right:10%;z-index:2;width:52px;height:52px;border:none;border-radius:50%;background:rgba(255,255,255,.88);box-shadow:0 4px 18px rgba(232,120,154,.28);font-size:1.5rem;cursor:pointer;animation:auth-heart-pulse 2s ease-in-out infinite}
.auth-heart-float-btn:active{transform:scale(1.15)}
.auth-heart-tap{cursor:pointer;border:none;padding:0;transition:transform .2s}
.auth-heart-tap:active,.auth-heart-tap.heart-pop{transform:scale(1.35)}
.auth-music-btn{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:10000;padding:10px 20px;border:none;border-radius:20px;background:rgba(255,255,255,.92);color:#c97a8e;font-size:.85rem;box-shadow:0 4px 16px rgba(232,120,154,.25);cursor:pointer;touch-action:manipulation}
.auth-bgm-badge{position:fixed;top:calc(12px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:10001;padding:6px 14px;border-radius:16px;background:rgba(255,255,255,.9);color:#c97a8e;font-size:.78rem;box-shadow:0 2px 12px rgba(232,120,154,.2);pointer-events:none;animation:auth-heart-pulse 2s ease-in-out infinite}
.auth-burst-big{font-size:1.35rem;animation:auth-burst-big 1.1s ease-out forwards}
@keyframes auth-burst-big{0%{opacity:1;transform:translate(0,0) scale(.25)}100%{opacity:0;transform:translate(var(--bx,0),var(--by,-48px)) scale(1.65)}}
.welcome-fw{position:fixed;pointer-events:none;z-index:9998;font-size:1.3rem;animation:welcome-fw 1.35s ease-out forwards}
@keyframes welcome-fw{0%{opacity:1;transform:translate(0,0) scale(.3)}100%{opacity:0;transform:translate(var(--fx,0),var(--fy,-60px)) scale(1.4)}}
.bgm-heart-particle{position:fixed;pointer-events:none;z-index:10002;font-size:1.15rem;transform:translate(-50%,-50%);animation:bgm-heart-burst 1.75s ease-out forwards}
.bgm-heart-dot{position:fixed;pointer-events:none;z-index:10002;width:6px;height:6px;border-radius:50%;transform:translate(-50%,-50%);animation:bgm-heart-burst 1.75s ease-out forwards}
@keyframes bgm-heart-burst{0%{opacity:0;transform:translate(-50%,-50%) scale(.15)}12%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0;transform:translate(calc(-50% + var(--hx,0)),calc(-50% + var(--hy,0))) scale(.5)}}
.bgm-heart-glow{position:fixed;pointer-events:none;z-index:10001;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(255,120,160,.45) 0%,transparent 70%);transform:translate(-50%,-50%);animation:bgm-heart-glow 1.8s ease-out forwards}
@keyframes bgm-heart-glow{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.2)}}
.bgm-balloon{position:fixed;bottom:-90px;z-index:10002;width:38px;height:48px;border-radius:50% 50% 50% 50%/58% 58% 42% 42%;box-shadow:inset -6px -6px 12px rgba(0,0,0,.08);animation:bgm-balloon-rise 6s ease-in forwards;pointer-events:none}
.bgm-balloon::after{content:'';position:absolute;bottom:-22px;left:50%;width:1px;height:24px;background:rgba(180,120,140,.45);transform:translateX(-50%)}
@keyframes bgm-balloon-rise{0%{transform:translateY(0) translateX(0);opacity:0}8%{opacity:.92}100%{transform:translateY(-115vh) translateX(var(--sway,16px));opacity:.65}}
.bgm-love-wrap{position:fixed;inset:0;z-index:10004;display:flex;align-items:center;justify-content:center;pointer-events:none}
.bgm-love-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(255,190,210,.28) 0%,transparent 65%);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.bgm-love-text{position:relative;z-index:1;font-size:clamp(2.4rem,11vw,4.8rem);font-family:Georgia,'Times New Roman',serif;font-style:italic;font-weight:600;color:rgba(255,92,138,.88);text-shadow:0 0 40px rgba(255,100,150,.6);opacity:0;filter:blur(8px);animation:bgm-love-in 4.5s ease forwards;letter-spacing:.12em}
@keyframes bgm-love-in{0%{opacity:0;transform:scale(.55);filter:blur(20px)}25%{opacity:.75;transform:scale(1.04);filter:blur(7px)}55%{opacity:.7;transform:scale(1.02);filter:blur(5px)}80%{opacity:.5;filter:blur(9px)}100%{opacity:0;transform:scale(1.08);filter:blur(18px)}}
.bgm-couple-glow{position:fixed;pointer-events:none;z-index:10002;width:min(92vw,380px);height:min(75vh,520px);border-radius:50%;background:radial-gradient(ellipse,rgba(255,100,150,.42) 0%,rgba(255,180,200,.15) 45%,transparent 70%);transform:translate(-50%,-50%);animation:bgm-couple-glow 3s ease-out forwards}
@keyframes bgm-couple-glow{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}40%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:.6;transform:translate(-50%,-50%) scale(1.15)}}
.bgm-couple-solid{position:fixed;pointer-events:none;z-index:10003;font-size:1.55rem;transform:translate(-50%,-50%);opacity:0;animation:bgm-couple-solid-in .4s ease forwards;text-shadow:0 0 10px rgba(255,100,150,.8)}
.bgm-couple-solid-dot{position:fixed;pointer-events:none;z-index:10003;width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#ff3d7a,#ff8fab);box-shadow:0 0 10px rgba(255,60,120,1),0 0 20px rgba(255,100,150,.7);transform:translate(-50%,-50%);opacity:0;animation:bgm-couple-solid-in .35s ease forwards}
@keyframes bgm-couple-solid-in{0%{opacity:0;transform:translate(-50%,-50%) scale(.15)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.bgm-couple-particle{position:fixed;pointer-events:none;z-index:10003;font-size:1rem;transform:translate(-50%,-50%);animation:bgm-couple-spark 2.2s ease-out forwards}
.bgm-couple-dot{position:fixed;pointer-events:none;z-index:10003;width:5px;height:5px;border-radius:50%;transform:translate(-50%,-50%);animation:bgm-couple-spark 2.2s ease-out forwards}
@keyframes bgm-couple-spark{0%{opacity:0;transform:translate(-50%,-50%) scale(.1)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(calc(-50% + var(--cx,0)),calc(-50% + var(--cy,-20px))) scale(.4)}}
.auth-btn:active{transform:scale(.97)}
/* 二级登录 · 二人秘境 */
.auth-gate-dual{background:linear-gradient(165deg,#fce4ec 0%,#fdf6f8 35%,#f5f0ff 70%,#fff8fb 100%)}
.auth-gate-dual::before{opacity:.25;background-image:radial-gradient(circle,#ffd4e5 1px,transparent 1px),radial-gradient(circle,rgba(255,255,255,.8) 1px,transparent 1px);background-size:32px 32px,48px 48px}
.auth-dual-wrap{position:relative;z-index:1;width:100%;max-width:380px;padding:8px 4px}
.auth-dual-cloud{position:absolute;font-size:1.4rem;opacity:.35;pointer-events:none;animation:auth-cloud-drift 8s ease-in-out infinite}
.auth-dual-cloud.c1{top:8%;left:6%;animation-delay:0s}
.auth-dual-cloud.c2{top:14%;right:8%;animation-delay:2s;font-size:1.1rem}
.auth-dual-cloud.c3{bottom:18%;left:10%;animation-delay:4s;font-size:1rem}
@keyframes auth-cloud-drift{0%,100%{transform:translate(0,0)}50%{transform:translate(8px,-6px)}}
.auth-dual-corner{position:absolute;font-size:1.6rem;opacity:.45;pointer-events:none}
.auth-dual-corner.tl{top:6%;left:4%;transform:rotate(-12deg)}
.auth-dual-corner.br{bottom:8%;right:4%;transform:rotate(8deg)}
.auth-dual-card{background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border:1px solid rgba(240,212,220,.6);border-radius:32px;padding:28px 22px 24px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(232,120,154,.12),inset 0 1px 0 rgba(255,255,255,.8)}
.auth-dual-avatars{display:flex;align-items:center;justify-content:center;gap:0;margin:0 auto 18px;max-width:280px}
.auth-dual-avatar-wrap{flex:0 0 auto;text-align:center}
.auth-dual-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid #f8d4e0;box-shadow:0 4px 16px rgba(232,120,154,.2);display:block;margin:0 auto 6px;background:#fff}
.auth-dual-name{font-size:.72rem;color:#c97a8e;font-weight:600}
.auth-dual-link{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-width:48px;height:72px}
.auth-dual-link::before{content:'';position:absolute;left:0;right:0;top:50%;height:2px;background:linear-gradient(90deg,rgba(248,212,224,.3),rgba(232,120,154,.55),rgba(248,212,224,.3));border-radius:2px}
.auth-dual-heart{position:relative;z-index:1;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:1rem;background:rgba(255,255,255,.9);border-radius:50%;box-shadow:0 2px 10px rgba(232,120,154,.25);animation:auth-heart-pulse 2s ease-in-out infinite}
@keyframes auth-heart-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.auth-dual-card h2{font-size:1.08rem;color:#c97a8e;margin-bottom:6px;font-weight:600;letter-spacing:.02em}
.auth-dual-sub{font-size:.78rem;color:var(--text2);margin-bottom:16px;line-height:1.5}
.auth-dual-hint{font-size:.82rem;color:#b8959a;margin-bottom:10px}
.auth-dual-input{width:100%;padding:14px 16px;border:1px solid rgba(240,212,220,.8);border-radius:16px;text-align:center;font-size:1rem;letter-spacing:.08em;background:rgba(255,255,255,.7);margin-bottom:12px;box-shadow:inset 0 1px 4px rgba(232,120,154,.06)}
.auth-dual-input:focus{outline:none;border-color:#e8789a;background:#fff}
.auth-dual-btn{width:100%;padding:14px;border-radius:18px;background:linear-gradient(135deg,#f0a8c0,#e8789a);color:#fff;font-size:.92rem;font-weight:500;margin-bottom:8px;box-shadow:0 6px 20px rgba(232,120,154,.28);transition:transform .15s}
.auth-dual-btn:active{transform:scale(.97)}
.auth-dual-msg{font-size:.8rem;color:var(--danger);min-height:1.4em;line-height:1.5}
.auth-success-modal{position:fixed;inset:0;z-index:10002;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(60,40,48,.4);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .35s}
.auth-success-modal.show{opacity:1;pointer-events:auto}
.auth-success-card{background:#fff;border-radius:24px;padding:32px 24px;max-width:320px;width:100%;text-align:center;border:2px solid #f0d4dc;box-shadow:0 16px 48px rgba(232,120,154,.2);transform:scale(.9);transition:transform .35s}
.auth-success-modal.show .auth-success-card{transform:scale(1)}
.auth-success-card .success-icon{font-size:2.5rem;margin-bottom:12px}
.auth-success-card p{font-size:.95rem;color:#c97a8e;line-height:1.6;font-weight:500}
/* 悄悄话聊天 */
.chat-page{display:flex;flex-direction:column;min-height:calc(100vh - 120px);max-height:calc(100dvh - 100px)}
.chat-presence-bar{font-size:.8rem;color:var(--accent);padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;text-align:center}
.chat-messages{flex:1;overflow-y:auto;padding:8px 4px 12px;display:flex;flex-direction:column;gap:10px;min-height:280px;max-height:calc(100dvh - 280px)}
.chat-msg{display:flex;flex-direction:column;max-width:82%}
.chat-msg.mine{align-self:flex-end;align-items:flex-end}
.chat-msg.peer{align-self:flex-start;align-items:flex-start}
.chat-msg-meta{font-size:.68rem;color:var(--text2);margin-bottom:3px;padding:0 4px}
.chat-bubble{padding:10px 14px;border-radius:16px;font-size:.88rem;line-height:1.5;word-break:break-word;background:var(--surface);border:1px solid var(--border)}
.chat-msg.mine .chat-bubble{background:linear-gradient(135deg,#fce4ec,#fdf2f6);border-color:#f0d4dc;color:#5c4048}
.chat-bubble img,.chat-bubble video{max-width:100%;border-radius:10px;display:block;margin-top:4px}
.chat-bubble audio{width:100%;min-width:200px;margin-top:4px}
.chat-input-bar{display:flex;gap:8px;align-items:flex-end;padding:10px 0 4px;border-top:1px solid var(--border);flex-wrap:wrap}
.chat-input-bar textarea{flex:1;min-width:120px;min-height:42px;max-height:100px;padding:10px 12px;border:1px solid var(--border);border-radius:14px;background:var(--bg);font-size:.88rem;resize:none;font-family:inherit}
.chat-input-actions{display:flex;gap:6px;flex-wrap:wrap}
.chat-input-actions button{min-width:44px;min-height:44px;padding:0 12px;border:1px solid var(--border);border-radius:12px;background:var(--surface);font-size:1rem;cursor:pointer}
.chat-input-actions button.on{background:var(--accent-bg);border-color:var(--accent)}
.chat-empty{text-align:center;color:var(--text2);font-size:.85rem;padding:40px 16px}
@media(max-width:768px){
  .chat-page{min-height:calc(100dvh - var(--bnav-h) - 80px)}
  .chat-messages{max-height:calc(100dvh - var(--bnav-h) - 260px)}
}
.hero-top{display:flex;align-items:center;gap:14px;margin-bottom:4px}
.hero-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--accent-bg);flex-shrink:0;box-shadow:0 2px 10px rgba(184,149,154,.18)}
.home-fav-formulas{margin-bottom:16px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.hff-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:.88rem;font-weight:600;color:var(--accent)}
.fav-formula-grid{display:flex;flex-wrap:wrap;gap:8px}
.fav-formula-chip{padding:8px 12px;border:1px solid var(--border);border-radius:12px;background:var(--bg);cursor:pointer;max-width:100%;transition:border-color .12s}
.fav-formula-chip:active{border-color:var(--accent)}
.ffc-mod{display:block;font-size:.65rem;color:var(--text2);margin-bottom:2px}
.ffc-name{display:block;font-size:.8rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.formula-item-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.formula-star{font-size:1rem;color:var(--text2);padding:2px 4px;flex-shrink:0;min-width:32px;min-height:32px}
.formula-star.on{color:#e8a54b}
.voice-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
.voice-bar .btn{min-height:44px;padding:10px 14px}
.voice-status{font-size:.78rem;color:var(--accent)}
.font-scale-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.font-scale-bar .btn{min-width:44px;padding:6px 10px;font-size:.78rem}
.font-scale-bar .btn.on{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
/* 家教反馈单 */
.feedback-doc{background:#fff;border:2px solid #f0d4dc;border-radius:16px;overflow:hidden;margin-top:14px}
.fd-header{background:linear-gradient(135deg,#f3ecee,#fce8ee);padding:18px 20px;text-align:center;border-bottom:2px dashed #f0d4dc}
.fd-logo{font-size:1.1rem;font-weight:700;color:var(--accent)}
.fd-sub{font-size:.78rem;color:var(--text2);margin-top:4px}
.fd-body{padding:16px 20px;font-size:.88rem;line-height:1.75}
.fd-row{margin-bottom:10px}
.fd-label{color:var(--text2);font-size:.75rem;margin-bottom:2px}
.fd-val{font-weight:500}
.fd-footer{text-align:center;padding:12px;font-size:.72rem;color:var(--text2);border-top:1px dashed var(--border)}
.fb-type-tabs{display:flex;gap:8px;margin-bottom:14px}
.fb-type-tab{flex:1;padding:12px;border-radius:14px;border:2px solid var(--border);text-align:center;cursor:pointer;font-size:.85rem;background:var(--surface)}
.fb-type-tab.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:600}
/* 薄弱点分析 */
.weak-bar-wrap{margin:8px 0 14px}
.weak-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.weak-bar-name{flex:0 0 72px;font-size:.78rem;text-align:right;color:var(--text2)}
.weak-bar-track{flex:1;height:22px;background:var(--bg);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.weak-bar-fill{height:100%;background:linear-gradient(90deg,#e8b4bc,#c9a0a8);border-radius:12px;transition:width .4s}
.weak-bar-num{flex:0 0 48px;font-size:.75rem;color:var(--accent);font-weight:600}
.weak-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.weak-stat{text-align:center;padding:12px 8px;background:var(--accent-bg);border-radius:14px}
.weak-stat-num{font-size:1.3rem;font-weight:700;color:var(--accent)}
.weak-stat-label{font-size:.68rem;color:var(--text2);margin-top:2px}
/* 画板移动端 */
.draw-page{display:flex;flex-direction:column}
.draw-tools-panel{flex-shrink:0}
.draw-pen-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.draw-pen-row input[type=range]{flex:1;min-width:60px;height:28px}
.draw-pen-label{font-size:.75rem;color:var(--text2);white-space:nowrap}
.draw-pen-val{font-size:.85rem;font-weight:600;color:var(--accent);min-width:1.5em}

<script>
/* === app-auth.js (early) === */
// 登录门禁 · 轻量优先加载 + 聊表心意 BGM + 登录页爱心特效
(function () {
  const PASS_L1 = ['060303', '060126'];
  const PASS_L2 = '123';
  const KEY_L1 = 'math-auth-l1';
  const KEY = 'math-auth-session';
  const BGM_FILE = 'liaobiaoxinyi.mp3';
  const BGM_LITE = 'liaobiaoxinyi-lite.mp3';
  const AUTH_PARTICLES = ['💕', '💗', '💖', '❤️', '🩷', '✨', '⭐', '🌟', '💫', '♡'];
  const APP_SCRIPTS = ['app-main.js', 'app-mobile.js', 'app-lazy.js'];

  let bgm = null;
  let bgmPlaying = false;
  let bgmWantPlay = false;
  let bgmBlobUrl = null;
  let bgmFetchPromise = null;
  let bgmRetryTimer = null;
  let bgmKeepAliveTimer = null;
  let bgmLastTime = 0;
  let bgmStallTicks = 0;
  let bgmStreamUrl = BGM_FILE;
  let appScriptsLoading = null;

  function ssGet(k) {
    try { return sessionStorage.getItem(k); } catch { return null; }
  }
  function ssSet(k, v) {
    try { sessionStorage.setItem(k, v); } catch {}
  }
  function isAuthedL1() { return ssGet(KEY_L1) === '1'; }
  function isAuthed() { return ssGet(KEY) === '1'; }

  function tap(el, fn) {
    if (!el || el._authTap) return;
    el._authTap = true;
    el.addEventListener('click', fn);
    el.addEventListener('touchend', e => { e.preventDefault(); fn(e); }, { passive: false });
  }

  function showMsg(id, text, danger) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    if (danger !== undefined) el.style.color = danger ? 'var(--danger, #c47a7a)' : '';
  }

  function loadAppScripts() {
    if (window._appScriptsReady || (typeof render === 'function')) {
      window._appScriptsReady = true;
      return Promise.resolve();
    }
    if (appScriptsLoading) return appScriptsLoading;
    appScriptsLoading = new Promise(resolve => {
      let i = 0;
      const next = () => {
        if (i >= APP_SCRIPTS.length) {
          window._appScriptsReady = true;
          resolve();
          return;
        }
        const src = APP_SCRIPTS[i++];
        if (document.querySelector(`script[src="${src}"]`)) { next(); return; }
        const s = document.createElement('script');
        s.src = src;
        s.async = false;
        s.onload = next;
        s.onerror = () => { console.warn('script load:', src); next(); };
        document.body.appendChild(s);
      };
      next();
    });
    return appScriptsLoading;
  }

  function waitForRender() {
    return new Promise(resolve => {
      if (typeof render === 'function') { resolve(); return; }
      let n = 0;
      const tick = () => {
        if (typeof render === 'function' || ++n > 60) resolve();
        else setTimeout(tick, 80);
      };
      tick();
    });
  }

  function ensureAppReady(cb) {
    return loadAppScripts().then(waitForRender).then(() => cb?.());
  }

  function runBootApp() {
    ensureAppReady(() => {
      if (!window._bootAppFn) return;
      if (window._bootAppCalled) {
        try { window._bootAppFn(); } catch (e) { console.error('bootApp retry', e); }
        return;
      }
      window._bootAppCalled = true;
      try { window._bootAppFn(); } catch (e) { console.error('bootApp', e); window._bootAppCalled = false; }
    });
  }

  function isContentEmpty() {
    const c = document.getElementById('content');
    if (!c) return true;
    return !c.querySelector('.home-quick .quick-btn[data-go], .section-title, .draw-page, .quiz-item');
  }

  function scheduleBootRetry() {
    if (!isAuthed() && !window._authEarlyDone) return;
    [300, 800, 1500, 3000, 5000, 8000].forEach(ms => {
      setTimeout(() => {
        if (!isContentEmpty()) return;
        if (typeof render === 'function') {
          try { render(); } catch {}
        } else {
          runBootApp();
        }
      }, ms);
    });
  }

  /* ── 登录页 · 点击爱心 / 飘落粒子 ── */
  function spawnAuthHeartBurst(x, y, big) {
    const icons = ['💕', '💖', '❤️', '🩷', '✨', '⭐', '♡', '🌟', '💗'];
    const n = big ? 24 : 14;
    for (let i = 0; i < n; i++) {
      const el = document.createElement('span');
      el.className = big ? 'auth-burst auth-burst-big' : 'auth-burst';
      el.textContent = icons[Math.floor(Math.random() * icons.length)];
      const angle = (Math.PI * 2 * i) / n + Math.random() * 0.5;
      const dist = (big ? 55 : 32) + Math.random() * (big ? 100 : 42);
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--by', Math.sin(angle) * dist + 'px');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), big ? 1300 : 950);
    }
  }

  function bindAuthHeartBtn(id) {
    const btn = document.getElementById(id);
    if (!btn || btn._heartBound) return;
    btn._heartBound = true;
    const pop = e => {
      const r = btn.getBoundingClientRect();
      spawnAuthHeartBurst(r.left + r.width / 2, r.top + r.height / 2, true);
      btn.classList.add('heart-pop');
      setTimeout(() => btn.classList.remove('heart-pop'), 350);
      e.preventDefault();
      e.stopPropagation();
    };
    btn.addEventListener('click', pop);
    btn.addEventListener('touchend', pop, { passive: false });
  }

  function startAuthFloat(containerId) {
    const box = document.getElementById(containerId);
    if (!box || box._floatOn) return;
    box._floatOn = true;
    const spawn = () => {
      if (!box.isConnected) return;
      const el = document.createElement('span');
      el.className = 'auth-float-item';
      el.textContent = AUTH_PARTICLES[Math.floor(Math.random() * AUTH_PARTICLES.length)];
      el.style.left = (Math.random() * 100) + '%';
      el.style.bottom = '-24px';
      el.style.fontSize = (.7 + Math.random() * .9) + 'rem';
      el.style.animationDuration = (9 + Math.random() * 8) + 's';
      el.style.animationDelay = (Math.random() * 2) + 's';
      box.appendChild(el);
      setTimeout(() => el.remove(), 20000);
    };
    for (let i = 0; i < 6; i++) setTimeout(spawn, i * 400);
    box._floatTimer = setInterval(spawn, 1800);
  }

  function stopAuthFloat(containerId) {
    const box = document.getElementById(containerId);
    if (!box) return;
    if (box._floatTimer) clearInterval(box._floatTimer);
    box._floatOn = false;
  }

  function bindAuthUiEffects() {
    const gate = document.getElementById('authGate');
    const gate2 = document.getElementById('authGate2');
    if (gate && gate.style.display !== 'none') {
      startAuthFloat('authParticlesL1');
      bindAuthHeartBtn('authHeartL1');
    }
    if (gate2 && gate2.style.display !== 'none') {
      startAuthFloat('authParticlesL2');
      bindAuthHeartBtn('authHeartL2');
    }
  }

  /* ── BGM 角标 ── */
  function showPlayingBadge(text) {
    let badge = document.getElementById('authBgmBadge');
    if (!badge) {
      badge = document.createElement('div');
      badge.id = 'authBgmBadge';
      badge.className = 'auth-bgm-badge';
      document.body.appendChild(badge);
    }
    badge.textContent = text || '🎵 聊表心意';
    badge.style.display = 'block';
  }

  function hidePlayingBadge() {
    const badge = document.getElementById('authBgmBadge');
    if (badge) badge.style.display = 'none';
  }

  /* ── 播完 · 浪漫终章烟花 ── */
  function heartPoint(t, scale) {
    const x = 16 * Math.pow(Math.sin(t), 3) * scale;
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * scale;
    return { x, y };
  }

  function spawnHeartShape(cx, cy, scale, steps) {
    const icons = ['💕', '💖', '❤️', '🩷', '♥', '💗', '✨'];
    const dotColors = ['#ff6b9d', '#ff8fab', '#ffb3c6', '#e8457a', '#ffc0cb', '#f472b6'];
    const glow = document.createElement('div');
    glow.className = 'bgm-heart-glow';
    glow.style.left = cx + 'px';
    glow.style.top = cy + 'px';
    document.body.appendChild(glow);
    setTimeout(() => glow.remove(), 2200);
    for (let i = 0; i < steps; i++) {
      const t = (Math.PI * 2 * i) / steps;
      const pt = heartPoint(t, scale);
      const px = cx + pt.x;
      const py = cy + pt.y;
      const burst = 1.5 + Math.random() * 1.0;
      const hx = pt.x * burst + (Math.random() - 0.5) * 28;
      const hy = pt.y * burst + (Math.random() - 0.5) * 28;
      if (i % 2 === 0) {
        const dot = document.createElement('span');
        dot.className = 'bgm-heart-dot';
        dot.style.left = px + 'px';
        dot.style.top = py + 'px';
        dot.style.background = dotColors[i % dotColors.length];
        dot.style.setProperty('--hx', hx + 'px');
        dot.style.setProperty('--hy', hy + 'px');
        dot.style.animationDelay = (Math.random() * 0.18) + 's';
        document.body.appendChild(dot);
        setTimeout(() => dot.remove(), 2400);
      }
      const el = document.createElement('span');
      el.className = 'bgm-heart-particle';
      el.textContent = icons[i % icons.length];
      el.style.left = px + 'px';
      el.style.top = py + 'px';
      el.style.setProperty('--hx', hx + 'px');
      el.style.setProperty('--hy', hy + 'px');
      el.style.animationDelay = (Math.random() * 0.15) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2400);
    }
  }

  function launchBalloons() {
    const colors = ['#ff6b9d', '#ff8fab', '#ffb347', '#87ceeb', '#dda0dd', '#98fb98', '#ffc0cb', '#f9a8d4'];
    for (let i = 0; i < 16; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'bgm-balloon';
        el.style.left = (5 + Math.random() * 88) + '%';
        el.style.background = `radial-gradient(circle at 35% 30%, rgba(255,255,255,.55), ${colors[i % colors.length]})`;
        el.style.setProperty('--sway', ((Math.random() - 0.5) * 60) + 'px');
        el.style.animationDuration = (4.5 + Math.random() * 3) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 9000);
      }, i * 180);
    }
  }

  function showLoveYouFinale() {
    const wrap = document.createElement('div');
    wrap.className = 'bgm-love-wrap';
    wrap.innerHTML = '<div class="bgm-love-text">Love You</div>';
    document.body.appendChild(wrap);
    const w = window.innerWidth;
    const h = window.innerHeight;
    const cx = w * 0.5;
    const cy = h * 0.5;
    for (let i = 0; i < 36; i++) {
      setTimeout(() => {
        const angle = (Math.PI * 2 * i) / 36;
        const dist = 80 + Math.random() * 60;
        const px = cx + Math.cos(angle) * dist;
        const py = cy + Math.sin(angle) * dist * 0.55;
        const el = document.createElement('span');
        el.className = 'bgm-heart-particle';
        el.textContent = ['💕', '💖', '❤️', '♥'][i % 4];
        el.style.left = px + 'px';
        el.style.top = py + 'px';
        el.style.fontSize = (1 + Math.random() * 0.6) + 'rem';
        el.style.setProperty('--hx', (Math.cos(angle) * 40) + 'px');
        el.style.setProperty('--hy', (Math.sin(angle) * 30 - 20) + 'px');
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2600);
      }, i * 40);
    }
    setTimeout(() => wrap.remove(), 4500);
  }

  function buildCouplePoints() {
    const pts = [];
    const addCircle = (cx, cy, r, n) => {
      for (let i = 0; i < n; i++) {
        const a = (2 * Math.PI * i) / n;
        pts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
      }
    };
    const addLine = (x1, y1, x2, y2, steps) => {
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        pts.push({ x: x1 + (x2 - x1) * t, y: y1 + (y2 - y1) * t });
      }
    };
    const addFill = (cx, cy, rx, ry, n) => {
      for (let j = 0; j < n; j++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random());
        pts.push({ x: cx + rx * r * Math.cos(a), y: cy + ry * r * Math.sin(a) });
      }
    };
    addCircle(0.34, 0.16, 0.058, 22);
    addCircle(0.66, 0.14, 0.054, 22);
    addFill(0.34, 0.38, 0.075, 0.15, 35);
    addFill(0.66, 0.36, 0.07, 0.14, 35);
    addLine(0.34, 0.22, 0.34, 0.60, 14);
    addLine(0.66, 0.20, 0.66, 0.58, 14);
    addLine(0.24, 0.28, 0.34, 0.36, 10);
    addLine(0.22, 0.36, 0.20, 0.54, 8);
    addLine(0.42, 0.32, 0.58, 0.32, 12);
    addLine(0.76, 0.28, 0.66, 0.34, 10);
    addLine(0.78, 0.34, 0.80, 0.52, 8);
    addLine(0.50, 0.34, 0.46, 0.42, 6);
    addLine(0.46, 0.42, 0.54, 0.42, 6);
    addLine(0.32, 0.60, 0.26, 0.90, 10);
    addLine(0.36, 0.60, 0.38, 0.90, 10);
    addLine(0.62, 0.58, 0.56, 0.90, 10);
    addLine(0.70, 0.58, 0.76, 0.90, 10);
    for (let t = 0; t <= 1; t += 0.05) {
      pts.push({ x: 0.50 + 0.16 * Math.cos(Math.PI + t * Math.PI), y: 0.34 + 0.14 * Math.sin(t * Math.PI) });
    }
    return pts;
  }

  function launchCoupleSilhouette() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const cx = w * 0.5;
    const cy = h * 0.48;
    const scale = Math.min(w, h) * 1.08;
    const pts = buildCouplePoints();
    const hold = [];

    const glow = document.createElement('div');
    glow.className = 'bgm-couple-glow';
    glow.style.left = cx + 'px';
    glow.style.top = cy + 'px';
    document.body.appendChild(glow);
    setTimeout(() => glow.remove(), 5000);

    pts.forEach((p, i) => {
      setTimeout(() => {
        const px = cx + (p.x - 0.5) * scale;
        const py = cy + (p.y - 0.38) * scale;
        const dot = document.createElement('span');
        dot.className = 'bgm-couple-solid-dot';
        dot.style.left = px + 'px';
        dot.style.top = py + 'px';
        dot.style.animationDelay = (i * 0.006) + 's';
        document.body.appendChild(dot);
        hold.push(dot);
        if (i % 3 === 0) {
          const el = document.createElement('span');
          el.className = 'bgm-couple-solid';
          el.textContent = ['❤️', '💕', '💖', '🩷'][i % 4];
          el.style.left = px + 'px';
          el.style.top = py + 'px';
          el.style.animationDelay = (i * 0.006) + 's';
          document.body.appendChild(el);
          hold.push(el);
        }
      }, i * 6);
    });

    const chestX = cx;
    const chestY = cy + (0.36 - 0.38) * scale;
    setTimeout(() => {
      spawnHeartShape(chestX, chestY, Math.min(w, h) * 0.022, 68);
      spawnHeartShape(cx, cy - scale * 0.02, Math.min(w, h) * 0.017, 56);
    }, pts.length * 6 + 900);
    setTimeout(() => hold.forEach(el => el.remove()), 8500);
  }

  function launchRomanticFinale() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const base = Math.min(w, h);
    const positions = [
      { x: w * 0.5, y: h * 0.35, s: base * 0.013 },
      { x: w * 0.22, y: h * 0.28, s: base * 0.009 },
      { x: w * 0.78, y: h * 0.28, s: base * 0.009 },
      { x: w * 0.15, y: h * 0.55, s: base * 0.008 },
      { x: w * 0.85, y: h * 0.55, s: base * 0.008 },
      { x: w * 0.35, y: h * 0.68, s: base * 0.007 },
      { x: w * 0.65, y: h * 0.68, s: base * 0.007 },
      { x: w * 0.5, y: h * 0.18, s: base * 0.010 },
    ];
    positions.forEach((p, i) => setTimeout(() => spawnHeartShape(p.x, p.y, p.s, 52), i * 350));
    setTimeout(launchBalloons, 1200);
    setTimeout(showLoveYouFinale, 3800);
    setTimeout(launchCoupleSilhouette, 6200);
    setTimeout(() => {
      for (let i = 0; i < 5; i++) {
        setTimeout(() => spawnHeartShape(
          w * (0.2 + Math.random() * 0.6),
          h * (0.2 + Math.random() * 0.5),
          base * (0.008 + Math.random() * 0.005),
          44
        ), i * 400);
      }
    }, 9000);
  }

  function stopBgmKeepAlive() {
    if (bgmKeepAliveTimer) {
      clearInterval(bgmKeepAliveTimer);
      bgmKeepAliveTimer = null;
    }
  }

  function startBgmKeepAlive() {
    stopBgmKeepAlive();
    bgmKeepAliveTimer = setInterval(() => {
      const a = bgm;
      if (!a || !bgmWantPlay || a.ended) { stopBgmKeepAlive(); return; }
      if (a.paused) a.play().catch(() => {});
    }, 2500);
  }

  function bindBgmKeepAlive() {
    if (window._bgmKeepAliveBound) return;
    window._bgmKeepAliveBound = true;
    const resume = () => { if (bgmWantPlay) resumeBgm(); };
    document.addEventListener('visibilitychange', () => { if (!document.hidden) resume(); });
    window.addEventListener('pageshow', resume);
    document.addEventListener('touchstart', resume, { passive: true, capture: true });
    document.addEventListener('click', resume, { passive: true, capture: true });
  }

  function stopBgmRetry() {
    if (bgmRetryTimer) {
      clearInterval(bgmRetryTimer);
      bgmRetryTimer = null;
    }
  }

  function fetchBgmBlob() {
    if (bgmBlobUrl) return Promise.resolve(bgmBlobUrl);
    if (bgmFetchPromise) return bgmFetchPromise;
    bgmFetchPromise = fetch(BGM_FILE, { cache: 'force-cache' })
      .then(r => { if (!r.ok) throw new Error('bgm fetch'); return r.blob(); })
      .then(blob => {
        bgmBlobUrl = URL.createObjectURL(blob);
        window._bgmBlobReady = true;
        if (typeof window._onBgmBlobReady === 'function') window._onBgmBlobReady();
        const a = bgm;
        if (a && bgmWantPlay && !a.ended && bgmBlobUrl && a.src !== bgmBlobUrl) {
          applyBgmSrc(a, bgmBlobUrl, true);
        }
        return bgmBlobUrl;
      })
      .catch(err => {
        console.warn('bgm blob', err);
        bgmFetchPromise = null;
        return null;
      });
    return bgmFetchPromise;
  }

  function scheduleFetchBgmBlob() {
    if (bgmBlobUrl || bgmFetchPromise) return;
    const delay = bgmPlaying && bgm && bgm.currentTime > 1 ? 0 : 12000;
    setTimeout(() => {
      if (!bgmWantPlay || bgmBlobUrl || bgmFetchPromise) return;
      fetchBgmBlob();
    }, delay);
  }

  function resolveBgmStreamUrl() {
    fetch(BGM_LITE, { method: 'HEAD', cache: 'force-cache' })
      .then(r => {
        if (!r.ok) return;
        bgmStreamUrl = BGM_LITE;
        const a = bgm || document.getElementById('authBgm');
        if (!a || a.ended || !bgmWantPlay) return;
        if (!a.src.includes('liaobiaoxinyi')) return;
        if (a.currentTime > 0.5 && !a.paused) return;
        applyBgmSrc(a, BGM_LITE, true);
      })
      .catch(() => {});
  }

  function pickBgmUrl() {
    return bgmStreamUrl;
  }

  function applyBgmSrc(a, url, keepPlay) {
    if (!url || a.src === url) return;
    const pos = a.currentTime > 0 ? a.currentTime : 0;
    const shouldPlay = keepPlay || bgmWantPlay;
    a.src = url;
    a.load();
    a.addEventListener('canplay', () => {
      try { if (pos > 0) a.currentTime = Math.min(pos, a.duration || pos); } catch {}
      if (shouldPlay && a.paused) a.play().catch(() => {});
    }, { once: true });
  }

  function resumeBgm() {
    const a = bgm;
    if (!a || a.ended || !bgmWantPlay) return;
    if (a.paused) a.play().catch(() => {});
  }

  function ensureBgm() {
    if (bgm) return bgm;
    let el = document.getElementById('authBgm');
    if (!el) {
      el = document.createElement('audio');
      el.id = 'authBgm';
      el.style.display = 'none';
      document.body.appendChild(el);
    }
    el.loop = false;
    el.volume = 1;
    el.setAttribute('playsinline', '');
    el.setAttribute('webkit-playsinline', '');
    el.setAttribute('x5-playsinline', '');
    el.setAttribute('x5-video-player-type', 'h5');
    el.preload = 'auto';
    bgm = el;
    bindBgmKeepAlive();
    el.addEventListener('playing', () => {
      bgmPlaying = true;
      bgmLastTime = el.currentTime;
      stopBgmRetry();
      showPlayingBadge('🎵 聊表心意');
      startBgmKeepAlive();
      scheduleFetchBgmBlob();
    });
    el.addEventListener('ended', () => {
      bgmPlaying = false;
      bgmWantPlay = false;
      stopBgmKeepAlive();
      hidePlayingBadge();
      launchRomanticFinale();
    });
    el.addEventListener('error', () => showPlayingBadge('🎵 聊表心意 · 加载失败'));
    el.addEventListener('timeupdate', () => {
      if (!bgmWantPlay || el.paused || el.ended) return;
      if (el.currentTime <= bgmLastTime + 0.05) {
        bgmStallTicks++;
        if (bgmStallTicks >= 3) {
          bgmStallTicks = 0;
          if (bgmBlobUrl && el.src !== bgmBlobUrl) applyBgmSrc(el, bgmBlobUrl, true);
          else scheduleFetchBgmBlob();
          el.play().catch(() => {});
        }
      } else {
        bgmStallTicks = 0;
        bgmLastTime = el.currentTime;
      }
    });
    el.addEventListener('stalled', () => setTimeout(resumeBgm, 800));
    el.addEventListener('waiting', () => setTimeout(resumeBgm, 600));
    return bgm;
  }

  function startBgm() {
    const a = ensureBgm();
    if (a.ended) return;
    bgmWantPlay = true;
    if (bgmPlaying && !a.paused) return;

    const tryPlay = () => {
      a.play().then(() => {
        bgmPlaying = true;
        stopBgmRetry();
        showPlayingBadge('🎵 聊表心意');
        startBgmKeepAlive();
      }).catch(() => {});
    };

    const streamUrl = pickBgmUrl();
    if (!a.src || (!a.src.includes('liaobiaoxinyi') && !a.src.startsWith('blob:'))) {
      a.src = streamUrl;
      a.load();
    }

    if (a.readyState >= 2) tryPlay();
    else {
      showPlayingBadge('🎵 聊表心意 · 缓冲中');
      a.addEventListener('canplay', tryPlay, { once: true });
      a.addEventListener('loadeddata', tryPlay, { once: true });
    }
  }

  function setupMobileAutoplay() {
    const run = () => startBgm();
    try {
      if (typeof window.WeixinJSBridge === 'object') {
        window.WeixinJSBridge.invoke('getNetworkType', {}, run, false);
      }
    } catch {}
    document.addEventListener('WeixinJSBridgeReady', () => {
      try { window.WeixinJSBridge.invoke('getNetworkType', {}, run, false); } catch { run(); }
    }, false);
    try {
      if (window.mqq && typeof window.mqq.invoke === 'function') {
        window.mqq.invoke('device', 'getNetworkType', {}, run);
      }
    } catch {}
    try {
      if (window.QQJSBridge && typeof window.QQJSBridge.invoke === 'function') {
        window.QQJSBridge.invoke('getNetworkType', {}, run);
      }
    } catch {}
  }

  function setupWeixinAutoplay() {
    setupMobileAutoplay();
  }

  function scheduleBgm() {
    ensureBgm();
    const a = bgm;
    if (a && !a.src) { a.src = pickBgmUrl(); a.load(); }
    resolveBgmStreamUrl();
    startBgm();
    setupMobileAutoplay();
    let tries = 0;
    stopBgmRetry();
    bgmRetryTimer = setInterval(() => {
      tries++;
      if (bgmPlaying && !bgm?.paused && bgm && bgm.currentTime > 0.5) { stopBgmRetry(); return; }
      if (tries > 40) { stopBgmRetry(); return; }
      startBgm();
    }, 1200);
  }

  window.notifyHeavyModulesReady = function (cb) {
    const run = () => { try { cb?.(); } catch {} };
    let done = false;
    const once = () => { if (done) return; done = true; run(); };
    setTimeout(once, 6000);
    const tick = setInterval(() => {
      if (bgm && bgmPlaying && bgm.currentTime > 2) {
        clearInterval(tick);
        setTimeout(once, 400);
      }
    }, 400);
  };

  function unlock(onDone) {
    const gate = document.getElementById('authGate');
    const gate2 = document.getElementById('authGate2');
    const app = document.querySelector('.app');
    stopAuthFloat('authParticlesL1');
    stopAuthFloat('authParticlesL2');
    gate?.classList.add('auth-out');
    gate2?.classList.add('auth-out');
    setTimeout(() => {
      gate?.remove();
      gate2?.remove();
      document.getElementById('authSuccessModal')?.remove();
      document.body.classList.remove('auth-pending');
      if (app) { app.style.display = ''; app.classList.add('ready'); }
      document.body.classList.add('app-ready');
      window._authEarlyDone = true;
      onDone?.();
      runBootApp();
      scheduleBootRetry();
    }, 380);
  }

  function showSuccessThenUnlock(onDone) {
    const modal = document.getElementById('authSuccessModal');
    if (!modal) { unlock(onDone); return; }
    modal.classList.add('show');
    setTimeout(() => {
      modal.classList.remove('show');
      setTimeout(() => unlock(onDone), 200);
    }, 1800);
  }

  function showLevel2() {
    const gate = document.getElementById('authGate');
    const gate2 = document.getElementById('authGate2');
    if (!gate2) return;
    stopAuthFloat('authParticlesL1');
    gate?.classList.add('auth-out');
    setTimeout(() => {
      if (gate) gate.style.display = 'none';
      gate2.style.display = 'flex';
      gate2.classList.remove('auth-out');
      startAuthFloat('authParticlesL2');
      bindAuthHeartBtn('authHeartL2');
      startBgm();
      document.getElementById('authPwd2')?.focus();
    }, 300);
  }

  function bindLevel2() {
    const inp = document.getElementById('authPwd2');
    const btn = document.getElementById('authBtn2');
    const submit = () => {
      const v = (inp?.value || '').trim();
      if (!v) { showMsg('authMsg2', '请输入双人专属密码哦', true); return; }
      if (v === PASS_L2) {
        ssSet(KEY_L1, '1');
        ssSet(KEY, '1');
        window._freshLogin = true;
        showSuccessThenUnlock();
        return;
      }
      showMsg('authMsg2', '暗号不对哦，再试试我们的小约定吧', true);
      if (inp) { inp.value = ''; inp.focus(); }
    };
    tap(btn, submit);
    inp?.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  }

  function bindLevel1() {
    let fails = 0;
    const inp = document.getElementById('authPwd');
    const btn = document.getElementById('authBtn');
    const submit = () => {
      const v = (inp?.value || '').trim();
      if (!v) { showMsg('authMsg', '要先输入我们的小口令哦～'); return; }
      if (PASS_L1.includes(v)) {
        ssSet(KEY_L1, '1');
        bindLevel2();
        showLevel2();
        return;
      }
      fails++;
      showMsg('authMsg', fails === 1 ? '入口已上锁，答对才能进～' : '哎呀，口令不对哦～只有婉宁小朋友可以进入的✨');
      if (inp) { inp.value = ''; inp.focus(); }
    };
    tap(btn, submit);
    inp?.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  }

  function bootEarlyAuth() {
    const gate = document.getElementById('authGate');
    const app = document.querySelector('.app');
    if (!gate) {
      document.body.classList.add('app-ready');
      return;
    }

    if (isAuthed()) {
      gate.remove();
      document.getElementById('authGate2')?.remove();
      document.getElementById('authSuccessModal')?.remove();
      document.body.classList.remove('auth-pending');
      app && (app.style.display = '');
      app?.classList.add('ready');
      document.body.classList.add('app-ready');
      window._authEarlyDone = true;
      return;
    }

    document.body.classList.add('auth-pending');
    if (app) app.style.display = 'none';

    if (isAuthedL1()) {
      document.getElementById('authGate').style.display = 'none';
      const gate2 = document.getElementById('authGate2');
      if (gate2) {
        gate2.style.display = 'flex';
        bindLevel2();
        startAuthFloat('authParticlesL2');
        bindAuthHeartBtn('authHeartL2');
      }
    } else {
      bindLevel1();
      bindAuthUiEffects();
    }

    window._authEarlyBound = true;
    scheduleBgm();
  }

  bootEarlyAuth();

  window.addEventListener('load', () => {
    if (isAuthed() || window._authEarlyDone) {
      runBootApp();
      scheduleBootRetry();
    }
  });

  window.initAuthGate = function (onUnlock) {
    window._bootAppFn = onUnlock;
    bindAuthUiEffects();
    if (isAuthed() || window._authEarlyDone) {
      runBootApp();
      scheduleBootRetry();
      return;
    }
    if (!window._authEarlyBound) bootEarlyAuth();
  };

  window.spawnAuthHeartBurst = spawnAuthHeartBurst;
  window.launchRomanticFinale = launchRomanticFinale;
  window.launchHeartFireworks = launchRomanticFinale;
})();

</script>

        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="searchInput" placeholder="搜索公式、知识点… (Ctrl+K)" autocomplete="off">

          <div class="quick-btn" style="padding:14px;text-align:center;border:1px solid var(--border);border-radius:14px" onclick="if(typeof render==='function')render()"><div style="font-size:1.3rem">🏠</div><div style="font-size:.82rem;margin-top:4px">重新加载</div></div>

</div>

    <div class="modal-footer" id="modalFooter"></div>
  </div>

<script defer>
function bootApp() {
  try {
    document.body.classList.add('app-ready');
    if (typeof bindUniversalNavigation === 'function') bindUniversalNavigation();
    if (window._freshLogin && typeof launchWelcomeHeartFireworks === 'function') {
      window._freshLogin = false;
      setTimeout(() => launchWelcomeHeartFireworks(), 400);
    }
    const doRender = () => { if (typeof render === 'function') render(); };
    doRender();
    requestAnimationFrame(doRender);
    setTimeout(doRender, 120);
    [400, 1000, 2500].forEach(t => setTimeout(doRender, t));
    setTimeout(() => { if (typeof toast === 'function') toast('欢迎回来，婉 ❤️ 这里始终为你亮着光 ✨', 2600); }, 600);
    const loadHeavy = () => {
      if (typeof loadHeavyModules === 'function') {
        loadHeavyModules(() => {
          if (typeof startGlobalPhotoListener === 'function') startGlobalPhotoListener();
          doRender();
        });
      }
    };
    if (typeof notifyHeavyModulesReady === 'function') notifyHeavyModulesReady(loadHeavy);
    else setTimeout(loadHeavy, 12000);
  } catch (e) {
    console.error('bootApp', e);
    const c = document.getElementById('content');
    if (c) c.innerHTML = '<div class="content-inner"><p style="text-align:center;padding:48px 16px;color:var(--danger)">页面加载遇到问题，请刷新重试</p><button class="btn btn-primary" style="margin:12px auto;display:block" onclick="location.reload()">刷新页面</button></div>';
  }
}
function tryBoot() {
  try { if (sessionStorage.getItem('math-auth-session') !== '1') return; } catch {}
  if (typeof initAuthGate === 'function') initAuthGate(bootApp);
  else bootApp();
}
tryBoot();
</script>
